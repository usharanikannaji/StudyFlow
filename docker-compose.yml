version: '3.8'

services:

  # ── Flask Backend ──────────────────────────
  backend:
    build: .
    container_name: studyflow-backend
    ports:
      - "5000:5000"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=studyflow123
      - MYSQL_DB=studyflow_db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── MySQL Database ─────────────────────────
  db:
    image: mysql:8.0
    container_name: studyflow-db
    environment:
      MYSQL_ROOT_PASSWORD: studyflow123
      MYSQL_DATABASE: studyflow_db
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ── Named Volumes ──────────────────────────
volumes:
  mysql_data:
    driver: local
